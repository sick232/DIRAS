global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'diras-prometheus'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  # Rules files (uncomment when created)
  # - "diras_rules.yml"

scrape_configs:
  # Prometheus metrics endpoint
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # FastAPI application metrics
  - job_name: 'diras-app'
    static_configs:
      - targets: ['app:8000']
    metrics_path: '/metrics'
    scrape_interval: 5s

  # Elasticsearch metrics (if exporter installed)
  - job_name: 'elasticsearch'
    static_configs:
      - targets: ['elasticsearch:9200']
    metrics_path: '/_prometheus/metrics'
    scrape_interval: 10s

  # PostgreSQL metrics (if postgres_exporter running)
  - job_name: 'postgres'
    static_configs:
      - targets: ['localhost:9187']
    scrape_interval: 10s
